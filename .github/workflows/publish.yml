name: Publish to NPM

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run type check
        run: pnpm --filter ./packages/starlight-giscus typecheck
      
      - name: Run tests
        run: pnpm --filter ./packages/starlight-giscus test
      
      - name: Run tests with coverage
        run: pnpm --filter ./packages/starlight-giscus test:coverage

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish package
        run: pnpm publish --filter ./packages/starlight-giscus --no-git-checks
